name: Update Homebrew Formula

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-homebrew-formula:
    runs-on: macos-latest
    env:
      GIT_AUTHOR_NAME: github-actions[bot]
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
    steps:
      - name: Resolve workflow refs
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "source_ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "commit_ref=${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "source_ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "commit_ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out source ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.target.outputs.source_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install workflow helpers
        shell: bash
        run: python3 -m pip install packaging

      - name: Regenerate Homebrew formula
        shell: bash
        run: |
          if [ -n "${{ steps.target.outputs.version }}" ]; then
            python3 scripts/update_homebrew_formula.py --version "${{ steps.target.outputs.version }}"
          else
            python3 scripts/update_homebrew_formula.py
          fi

      - name: Preserve generated formula
        shell: bash
        run: cp Formula/nanobot.rb "$RUNNER_TEMP/nanobot.rb"

      - name: Check out commit branch
        if: steps.target.outputs.commit_ref != steps.target.outputs.source_ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.target.outputs.commit_ref }}

      - name: Decide whether to refresh formula
        id: refresh
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease || false }}
          RELEASE_VERSION: ${{ steps.target.outputs.version }}
        run: |
          if [ "$EVENT_NAME" != "release" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "Skipping formula update for prerelease $RELEASE_VERSION"
            echo "update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          from pathlib import Path

          from packaging.version import Version

          formula_path = Path("Formula/nanobot.rb")
          release_version = Version(os.environ["RELEASE_VERSION"].removeprefix("v"))

          if not formula_path.exists():
              print("update=true")
              raise SystemExit

          match = re.search(r'nanobot-ai-([0-9A-Za-z.+_-]+)\.tar\.gz', formula_path.read_text(encoding="utf-8"))
          if not match:
              print("update=true")
              raise SystemExit

          current_version = Version(match.group(1))
          print(f"update={'true' if release_version > current_version else 'false'}")
          PY

      - name: Restore generated formula
        if: steps.refresh.outputs.update == 'true'
        shell: bash
        run: cp "$RUNNER_TEMP/nanobot.rb" Formula/nanobot.rb

      - name: Commit formula refresh
        if: steps.refresh.outputs.update == 'true'
        shell: bash
        run: |
          if git diff --quiet -- Formula/nanobot.rb; then
            echo "No formula changes to commit."
            exit 0
          fi

          version="${{ steps.target.outputs.version }}"
          if [ -z "$version" ]; then
            version="$(python3 -c 'import tomllib; from pathlib import Path; print(tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
          fi

          git add Formula/nanobot.rb
          git commit -m "Update Homebrew formula for ${version#v}"
          git push origin "HEAD:${{ steps.target.outputs.commit_ref }}"
